<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nendys Calculator – Albion Online Crafting & Refining</title>
  <meta name="description" content="Calculate the exact cost of refining, crafting, food and potions in Albion Online. Inputs return rate, focus, bonus day, station fee and hearts. Replica of the Nendys V2 spreadsheet." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cinzel:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand__mark">N</div>
      <div>
        <div class="brand__title">Nendys Calculator</div>
        <div class="brand__sub">Albion Online · Crafting · Refining · Food · Potions</div>
      </div>
    </div>
    <div class="topbar__actions">
      <button id="exportBtn" class="btn btn--ghost" title="Export prices as JSON">Export</button>
      <button id="importBtn" class="btn btn--ghost" title="Import prices from JSON">Import</button>
      <input id="importFile" type="file" accept="application/json" hidden />
      <button id="resetBtn" class="btn btn--danger" title="Reset all stored prices">Reset</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <!-- nav populated by JS -->
    </aside>

    <main class="main" id="main">
      <!-- pages rendered by JS -->
    </main>
  </div>

  <footer class="footer">
    <span>Calculations replicate the Nendys V2 spreadsheet. Prices saved locally in your browser.</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
