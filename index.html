<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Content Security Policy:
      - default-src 'self'           : everything from this origin unless overridden
      - script-src   'self' 'unsafe-inline' jsdelivr  : we use inline onerror
        on item icons; Supabase JS comes from jsdelivr.
      - style-src    allows inline styles + Google Fonts CSS.
      - img-src      our origin + data: + the Albion render API.
      - connect-src  Supabase HTTPS + WSS (auth + realtime).
      - frame-ancestors 'none'       : nobody can iframe this site (clickjacking).
      - base-uri / form-action 'self': stops base-tag and form-action injections.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https://render.albiononline.com;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co;
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
  " />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Nendys Calculator – Albion Online Crafting, Refining, Food &amp; Potions</title>
  <meta name="description" content="Albion Online crafting, refining, food and potions calculator. Real recipes, live cost calculations, return-rate-aware (Island / City / Bonus City / Hideout), with chain-refining, hearts and focus support." />
  <meta name="theme-color" content="#0e1114" />

  <!-- Canonical -->
  <link rel="canonical" href="https://thealbioncalculator.com/" />

  <!-- Open Graph (Discord / Patreon / Facebook / LinkedIn link previews) -->
  <meta property="og:site_name"     content="Nendys Calculator" />
  <meta property="og:title"         content="Nendys Calculator – Albion Online Crafting &amp; Refining" />
  <meta property="og:description"   content="Real Albion recipes, live cost calculations, chain-refining and return-rate-aware. Invite-only Patreon community calculator." />
  <meta property="og:url"           content="https://thealbioncalculator.com/" />
  <meta property="og:type"          content="website" />
  <meta property="og:image"         content="https://thealbioncalculator.com/logo.png" />
  <meta property="og:image:alt"     content="Nendys Calculator" />
  <meta property="og:image:width"   content="256" />
  <meta property="og:image:height"  content="256" />
  <meta property="og:locale"        content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card"         content="summary" />
  <meta name="twitter:title"        content="Nendys Calculator – Albion Online Crafting &amp; Refining" />
  <meta name="twitter:description"  content="Real Albion recipes, live cost calculations, chain-refining and return-rate-aware." />
  <meta name="twitter:image"        content="https://thealbioncalculator.com/logo.png" />
  <meta name="twitter:image:alt"    content="Nendys Calculator" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!--
    Fonts are controlled by CSS variables (see :root in styles.css).
    To switch fonts: change the import below and the --font-body /
    --font-display variables. Defaults: Open Sans for both.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Favicon (Nendys avatar) -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="shortcut icon" href="favicon.ico" />
</head>
<body>

  <!-- ==============================================================
       LOGIN OVERLAY
       Shown until the user is authenticated against Supabase.
  =============================================================== -->
  <div id="login-overlay" class="login-overlay" hidden>
    <form class="login-card" id="login-form">
      <div class="login-card__brand">
        <img class="brand__mark brand__mark--img" src="logo.png" alt="Nendys" />
        <div class="login-card__title">Nendys Calculator</div>
        <div class="login-card__sub">Restricted access — please sign in</div>
      </div>
      <div class="field">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn--primary login-card__submit" id="login-submit">Sign In</button>
      <div id="login-error" class="login-card__error" hidden></div>
      <div class="login-card__footer">
        No account?
        <a href="https://www.patreon.com/c/Nendys" target="_blank" rel="noopener noreferrer" class="login-card__link">Join on Patreon</a>
      </div>
    </form>
  </div>

  <header class="topbar">
    <div class="brand">
      <img class="brand__mark brand__mark--img" src="logo.png" alt="Nendys" />
      <div>
        <div class="brand__title">Nendys Calculator</div>
        <div class="brand__sub">Albion Online · Crafting · Refining · Food · Potions</div>
      </div>
    </div>
    <div class="topbar__actions">
      <span id="current-user" class="topbar__user" hidden></span>
      <button id="exportBtn" class="btn btn--ghost" title="Export prices as JSON">Export</button>
      <button id="importBtn" class="btn btn--ghost" title="Import prices from JSON">Import</button>
      <input id="importFile" type="file" accept="application/json" hidden />
      <button id="resetBtn" class="btn btn--danger" title="Reset all stored prices">Reset</button>
      <button id="logoutBtn" class="btn btn--ghost" title="Sign out" hidden>Sign Out</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <!-- nav populated by JS -->
    </aside>

    <main class="main" id="main">
      <!-- pages rendered by JS -->
    </main>
  </div>

  <!-- Floating Home button — right-side, vertically centred. Hidden until
       login AND hidden on the home page itself. -->
  <button id="homeFab" class="home-fab" title="Return to home menu" hidden>
    Home <span class="home-fab__arrow" aria-hidden="true">→</span>
  </button>

  <footer class="footer">
    <span>TheAlbionCalculator is not associated with Sandbox Interactive.</span>
  </footer>

  <!-- Supabase JS SDK (UMD), pinned to a specific minor for supply-chain safety. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45/dist/umd/supabase.min.js"></script>
  <!-- Project credentials & helpers -->
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
